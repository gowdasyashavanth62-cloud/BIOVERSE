<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BioVerse – Karnataka PU Biology Learning Portal</title>
  <meta name="description" content="Master Biology for Karnataka PU, KCET & NEET. Complete learning platform with videos, notes, question bank, mock tests, and progress tracking.">
  <meta name="keywords" content="Karnataka PU Biology, KCET Biology, NEET Biology, PU Board, Biology Notes, Biology MCQ">
  <meta name="author" content="BioVerse">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧬</text></svg>">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/index.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/auth.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/sidebar.css">
  <link rel="stylesheet" href="/css/chapter.css">
  <link rel="stylesheet" href="/css/admin.css">
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
</head>
<body>
  <div id="app"></div>
  <div id="toast-container"></div>
  <div id="modal-container"></div>

  <!-- App Entry -->
  <script type="module" src="/js/main.js"></script>

  <!-- External APIs -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  
  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((reg) => console.log('Service Worker registered successfully:', reg.scope))
          .catch((err) => console.warn('Service Worker registration failed:', err));
      });
    }
  </script>
</body>
</html>
